<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Training</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0c0a11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
/* ---------- tokens ---------- */
:root{
  --paper:#0c0a11; --card:#15121d; --sunk:#100d17; --raised:#1d1828;
  --ink:#ece9f3; --ink-2:#a79fb8; --ink-3:#736b85;
  --rule:#272033; --rule-hard:#3b3352;
  --red:#a78bfa; --red-ink:#120e1c;
  --brass:#dcae5f; --olive:#5ecf9a;
  --shade:rgba(167,139,250,.07);
  --r-lg:14px; --r-md:10px; --r-sm:7px;
}
html[data-theme="light"]{
  --paper:#f5f3f9; --card:#ffffff; --sunk:#ebe7f3; --raised:#f0edf7;
  --ink:#191325; --ink-2:#5b5470; --ink-3:#8b83a0;
  --rule:#e3dff0; --rule-hard:#cac2dd;
  --red:#7c5cf0; --red-ink:#ffffff;
  --brass:#a2761f; --olive:#2f9d6d;
  --shade:rgba(124,92,240,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
/* condensed display face, no webfont — resolves on iOS, Android and desktop */
.dsp{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-weight:650; letter-spacing:-.022em;
}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:900px;margin:0 auto;padding:0 14px calc(90px + env(safe-area-inset-bottom))}

/* ---------- masthead ---------- */
header{
  position:sticky; top:0; z-index:60;
  background:color-mix(in srgb, var(--paper) 88%, transparent);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  margin:0 -14px 18px; padding:calc(10px + env(safe-area-inset-top)) 14px 0;
  border-bottom:1px solid var(--rule);
}
.mast{display:flex; align-items:center; justify-content:space-between; gap:12px}
.mast h1{margin:0; font-size:26px; line-height:1; letter-spacing:.01em}
.mast .camp{font-size:11px; letter-spacing:.18em; color:var(--ink-3); margin-top:5px}
.themebtn{
  background:none; border:1.5px solid var(--rule); color:var(--ink-2);
  border-radius:99px; padding:7px 13px; font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; cursor:pointer; font-weight:600; white-space:nowrap;
}
.themebtn:hover{border-color:var(--ink); color:var(--ink)}
nav{display:flex; gap:6px; margin-top:12px; overflow-x:auto; scrollbar-width:none; padding-bottom:0}
nav::-webkit-scrollbar{display:none}
nav button{border-radius:99px;
  font-family:inherit; font-weight:600; letter-spacing:-.01em;
  font-size:14.5px; white-space:nowrap; cursor:pointer;
  background:transparent; color:var(--ink-3); border:none;
  padding:9px 13px 8px; border-bottom:3px solid transparent; margin-bottom:-3px;
}
nav button:hover{color:var(--ink)}
nav button.on{background:var(--red); color:var(--red-ink); border-radius:99px; padding:9px 15px 8px}

/* ---------- section furniture ---------- */
.tab{display:none} .tab.on{display:block}
.eyebrow{font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--red);
  font-weight:700; margin:0 0 6px}
h2.sec{margin:0 0 8px; font-size:30px; line-height:1.02}
.lede{margin:0 0 20px; color:var(--ink-2); font-size:14px; max-width:62ch}
h3.blk{margin:0 0 10px; font-size:19px; line-height:1.1}
.card{background:var(--card); border:1px solid var(--rule); border-radius:var(--r-lg); padding:16px; margin:0 0 14px}
.card p{margin:0 0 9px; font-size:14px; color:var(--ink-2)}
.card p:last-child{margin-bottom:0}
.card ul{margin:0 0 4px; padding-left:18px; font-size:14px; color:var(--ink-2)}
.card li{margin-bottom:5px}
.card strong,.card b{color:var(--ink)}
.rule{height:1px; background:var(--rule); margin:16px 0}
.tape{display:inline-block; background:var(--shade); color:var(--red); border-radius:99px; padding:4px 11px 3px;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700}
.hint{font-size:12.5px; color:var(--ink-3); margin:8px 0 0}

/* ---------- day picker ---------- */
.days{display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin:0 0 8px}
.days.six{grid-template-columns:repeat(3,1fr)}
.days button{border-radius:var(--r-md);
  font-family:inherit; font-weight:600; letter-spacing:-.01em; font-size:15px; padding:13px 4px 11px; cursor:pointer; line-height:1;
  background:var(--card); color:var(--ink-2); border:1px solid var(--rule);
}
.days button small{display:block; font-size:9.5px; letter-spacing:.1em; color:var(--ink-3);
  margin-top:5px; font-weight:600}
.days button.on{background:var(--ink); color:var(--paper); border-color:var(--ink)}
.days button.on small{color:var(--paper); opacity:.65}
.dayhead{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
  border-bottom:1px solid var(--rule); padding-bottom:10px; margin:20px 0 14px}
.dayhead h3{margin:0; font-size:27px; line-height:1}
.dayhead .focus{font-size:12.5px; color:var(--ink-3); flex:1; min-width:180px}

/* ---------- exercise ---------- */
.ex{border:1px solid var(--rule); background:var(--card); border-radius:var(--r-lg); margin:0 0 10px; overflow:hidden}
.ex.core{box-shadow:inset 3px 0 0 var(--brass)}
.ex-top{display:flex; align-items:flex-start; gap:10px; padding:12px 13px; cursor:pointer}
.ex-top:hover{background:var(--shade)}
.ex-nm{flex:1; min-width:0}
.ex-nm .n{font-size:16.5px; line-height:1.15; display:block}
.ex-nm .m{font-size:11.5px; color:var(--ink-3); letter-spacing:.03em; margin-top:3px; display:block}
.ex-tog{font-size:19px; color:var(--ink-3); line-height:1; padding-top:2px}
.ex.open .ex-tog{color:var(--red)}
.pres{display:flex; flex-wrap:wrap; gap:0; border-top:1px solid var(--rule)}
.pres div{flex:1; min-width:64px; padding:8px 6px; text-align:center; border-right:1px solid var(--rule)}
.pres div:last-child{border-right:none}
.pres .k{font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); font-weight:700}
.pres .v{font-size:14.5px; margin-top:2px}
.pres .v.hot{color:var(--red)}
.detail{display:none; padding:0 13px 13px; border-top:1px solid var(--rule)}
.ex.open .detail{display:block}
.fld{margin-top:12px}
.fld .lab{font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; margin-bottom:5px}
.fld.cue .lab{color:var(--olive)} .fld.err .lab{color:var(--red)}
.fld.prg .lab{color:var(--brass)} .fld.why .lab{color:var(--ink-3)}
.fld ul{margin:0; padding-left:17px; font-size:13.5px; color:var(--ink-2)}
.fld li{margin-bottom:4px}
.fld p{margin:0; font-size:13.5px; color:var(--ink-2)}

/* ---------- log row ---------- */
.logrow{display:flex; flex-wrap:wrap; gap:6px; padding:11px 13px; border-top:1px dashed var(--rule);
  align-items:flex-end}
.fi{display:flex; flex-direction:column; gap:3px}
.fi label{font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); font-weight:700}
.fi input{
  background:var(--sunk); border:1px solid var(--rule); color:var(--ink);
  padding:9px 10px; font-size:16px; width:100%; border-radius:var(--r-sm); font-family:inherit;
  font-variant-numeric:tabular-nums;
}
.fi input:focus{outline:2px solid var(--red); outline-offset:-2px; border-color:var(--red)}
.fi.w{width:74px} .fi.r{width:60px} .fi.s{width:56px} .fi.rir{width:56px}
.fi.note{flex:1; min-width:100px}
.btn{
  font-family:inherit; font-weight:600; letter-spacing:-.005em;
  font-size:14px; padding:11px 17px; cursor:pointer; border:1px solid var(--red);
  background:var(--red); color:var(--red-ink); line-height:1; border-radius:var(--r-md);
}
.btn:hover{opacity:.86}
.btn.ghost{background:transparent; color:var(--ink); border-color:var(--rule)}
.btn.ghost:hover{border-color:var(--ink); opacity:1}
.btn.warn{background:transparent; color:var(--red); border-color:var(--red)}
.btn.sm{font-size:12px; padding:8px 12px}
.btn.full{width:100%}
.tools{display:flex; flex-wrap:wrap; gap:7px; margin-top:12px}

/* ---------- history ---------- */
.hist{padding:0 13px 12px; font-size:13px}
.hrow{display:flex; align-items:center; gap:9px; padding:6px 0; border-bottom:1px dotted var(--rule)}
.hrow:last-child{border-bottom:none}
.hrow .d{color:var(--ink-3); font-size:11.5px; letter-spacing:.04em; width:72px; flex-shrink:0}
.hrow .l{flex:1; font-variant-numeric:tabular-nums}
.hrow .nt{color:var(--ink-3); font-size:12px; font-style:italic}
.hrow .x{background:none; border:none; color:var(--ink-3); font-size:17px; cursor:pointer;
  padding:0 3px; line-height:1}
.hrow .x:hover{color:var(--red)}
.empty{color:var(--ink-3); font-size:13px; padding:4px 0}

/* ---------- rest timer ---------- */
.timer{
  position:sticky; top:calc(108px + env(safe-area-inset-top)); z-index:40;
  display:flex; align-items:center; gap:7px; flex-wrap:wrap;
  background:var(--raised); color:var(--ink); border:1px solid var(--rule);
  border-radius:var(--r-md); padding:9px 11px; margin:0 0 14px;
}
.timer .tl{font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; opacity:.6; font-weight:700}
.timer .tv{font-size:23px; font-variant-numeric:tabular-nums; min-width:64px; line-height:1}
.timer .tv.ring{color:var(--red)}
.timer button{
  background:transparent; border:1px solid var(--rule-hard); color:var(--ink-2); border-radius:var(--r-sm);
  font-size:11.5px; padding:6px 9px; cursor:pointer; letter-spacing:.06em; font-weight:600;
  font-family:inherit;
}
.timer button:hover{color:var(--red); border-color:var(--red)}
.timer button:hover{border-color:currentColor}
.timer .sp{flex:1}

/* ---------- stats + tale of the tape ---------- */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(88px,1fr)); gap:1px;
  background:var(--rule); border:1px solid var(--rule); border-radius:var(--r-lg);
  overflow:hidden; margin:0 0 14px}
.stat{background:var(--card); padding:11px 8px; text-align:center}
.stat .k{font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); font-weight:700}
.stat .v{font-size:22px; margin-top:3px; line-height:1; font-variant-numeric:tabular-nums}
.stat .v.up{color:var(--olive)} .stat .v.hot{color:var(--red)} .stat .v.br{color:var(--brass)}

.tape-sheet{background:var(--card); border:1px solid var(--rule); border-radius:var(--r-lg);
  overflow:hidden; padding:0; margin:0 0 16px}
.tape-hd{display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
  background:var(--raised); border-bottom:1px solid var(--rule); padding:12px; gap:8px}
.tape-hd .side{font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700}
.tape-hd .side.l{text-align:right; color:var(--ink-3)}
.tape-hd .side.r{text-align:left; color:var(--red)}
.tape-hd .vs{font-size:11px; letter-spacing:.14em; color:var(--ink-3); padding:0 4px}
.tape-row{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px;
  padding:11px 12px; border-bottom:1px solid var(--rule)}
.tape-row:last-child{border-bottom:none}
.tape-row .was{text-align:right; font-size:19px; color:var(--ink-3); font-variant-numeric:tabular-nums}
.tape-row .now{text-align:left; font-size:22px; font-variant-numeric:tabular-nums}
.tape-row .now.better{color:var(--olive)} .tape-row .now.worse{color:var(--red)}
.tape-row .mid{text-align:center; min-width:106px}
.tape-row .mid .n{font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink-3); font-weight:700; display:block}
.tape-row .mid .dl{font-size:11.5px; margin-top:2px; display:block; font-variant-numeric:tabular-nums}
.tape-row .mid .dl.better{color:var(--olive)} .tape-row .mid .dl.worse{color:var(--red)}

/* ---------- test entry ---------- */
.tgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px}
.tfield{border:1px solid var(--rule); background:var(--card); border-radius:var(--r-md); padding:12px}
.tfield label{font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3);
  font-weight:700; display:block}
.tfield .sub{font-size:11.5px; color:var(--ink-3); margin:3px 0 7px}
.tfield input{width:100%; background:var(--sunk); border:1px solid var(--rule); color:var(--ink);
  padding:10px; font-size:17px; font-family:inherit; font-variant-numeric:tabular-nums; border-radius:var(--r-sm)}
.tfield input:focus{outline:2px solid var(--red); outline-offset:-2px}

/* ---------- run ladder ---------- */
.ladder{display:flex; flex-wrap:wrap; gap:5px; margin:12px 0 0}
.rung{
  border:1px solid var(--rule); background:var(--card); color:var(--ink-3);
  border-radius:var(--r-sm); padding:9px 0; text-align:center; flex:1 0 58px; font-variant-numeric:tabular-nums;
  font-size:15px; position:relative;
}
.rung small{display:block; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; margin-top:1px}
.rung.done{background:var(--olive); color:#fff; border-color:var(--olive)}
.rung.now{background:var(--red); color:var(--red-ink); border-color:var(--red)}
.rung.done{color:var(--red-ink)}

/* ---------- chart ---------- */
.chart{background:var(--card); border:1px solid var(--rule); border-radius:var(--r-lg); padding:14px; margin:0 0 14px}
.chart .ct{font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-3);
  font-weight:700; margin-bottom:9px}
.axis{stroke:var(--rule); stroke-width:1}
.gridline{stroke:var(--rule); stroke-width:1; stroke-dasharray:2 4; opacity:.7}
.tick{font-size:9px; fill:var(--ink-3); font-family:system-ui,sans-serif}
.line{fill:none; stroke:var(--red); stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round}
.dot{fill:var(--card); stroke:var(--red); stroke-width:2}
.dot.best{fill:var(--brass); stroke:var(--brass)}
.barr{fill:var(--ink-3)} .barr:hover{fill:var(--red)}

/* ---------- progression tiers ---------- */
.tier{border:1px solid var(--rule); background:var(--card); border-radius:var(--r-md); margin:0 0 8px; padding:12px}
.tier-h{display:flex; align-items:center; gap:9px; margin-bottom:5px}
.tier-n{background:var(--sunk); color:var(--ink-2); font-size:10px; letter-spacing:.1em;
  padding:4px 9px 3px; border-radius:99px; font-weight:700; text-transform:uppercase; white-space:nowrap}
.tier.hit .tier-n{background:var(--olive); color:var(--red-ink)}
.tier-h .t{font-size:16px; flex:1; line-height:1.15}
.tier .gate{font-size:12.5px; color:var(--ink-3); margin-top:4px}
.tier .gate b{color:var(--brass)}

/* ---------- modal / toast ---------- */
.veil{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
  align-items:center; justify-content:center; z-index:200; padding:20px}
.veil.on{display:flex}
.modal{background:var(--card); border:1px solid var(--rule-hard); border-radius:var(--r-lg); max-width:380px; width:100%; padding:20px}
.modal h4{margin:0 0 8px; font-size:20px}
.modal p{margin:0 0 15px; font-size:14px; color:var(--ink-2)}
.modal .row{display:flex; gap:8px; justify-content:flex-end}
.toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(22px + env(safe-area-inset-bottom));
  background:var(--raised); color:var(--ink); border:1px solid var(--rule-hard);
  border-radius:99px; padding:11px 19px; font-size:13.5px; z-index:210;
  opacity:0; pointer-events:none; transition:opacity .2s}
.toast.on{opacity:1}

.foot{text-align:center; font-size:11.5px; letter-spacing:.02em;
  color:var(--ink-3); margin:28px 0 0; line-height:2}

/* ---------- today ---------- */
.hero{background:var(--card); border:1px solid var(--rule); border-radius:var(--r-lg);
  padding:18px 16px 16px; margin:0 0 12px; position:relative; overflow:hidden}
.hero.rest{border-style:dashed}
.hero .when{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); font-weight:700}
.hero h3{margin:6px 0 4px; font-size:36px; line-height:1; letter-spacing:-.035em}
.hero .sub{font-size:13.5px; color:var(--ink-2); margin:0}
.hero .meta{display:flex; gap:14px; flex-wrap:wrap; margin-top:13px; padding-top:13px;
  border-top:1px solid var(--rule)}
.hero .meta div{font-size:12px; color:var(--ink-3)}
.hero .meta b{display:block; font-size:17px; color:var(--ink); font-weight:650;
  letter-spacing:-.02em; font-variant-numeric:tabular-nums; margin-bottom:1px}
.week{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin:0 0 14px}
.week div{text-align:center; padding:8px 2px 7px; border:1px solid var(--rule); border-radius:var(--r-sm);
  background:var(--card); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-3)}
.week div b{display:block; font-size:11.5px; color:var(--ink-2); font-weight:600;
  text-transform:none; letter-spacing:-.01em; margin-top:3px}
.week div.now{background:var(--red); border-color:var(--red); color:var(--red-ink)}
.week div.now b{color:var(--red-ink)}
.week div.off b{color:var(--ink-3)}
.qr{border:1px solid var(--rule); background:var(--card); border-radius:var(--r-md); margin:0 0 7px; overflow:hidden}
.qr-t{display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer}
.qr-t:hover{background:var(--shade)}
.qr .nm{flex:1; min-width:0; font-size:14.5px; font-weight:600; letter-spacing:-.015em}
.qr .tgt{font-size:12px; color:var(--ink-3); font-variant-numeric:tabular-nums; white-space:nowrap}
.qr .last{font-size:12px; color:var(--brass); font-variant-numeric:tabular-nums; white-space:nowrap}
.qr .last.none{color:var(--ink-3)}
.qr.core .nm:after{content:"core"; font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--brass); margin-left:7px; font-weight:700}
.qr-b{display:none} .qr.open .qr-b{display:block}
.todo{display:flex; align-items:center; gap:11px; padding:12px; border:1px solid var(--rule);
  background:var(--card); border-radius:var(--r-md); margin:0 0 7px}
.todo .tx{flex:1; min-width:0}
.todo .tx b{display:block; font-size:14.5px; font-weight:600; letter-spacing:-.015em}
.todo .tx span{font-size:12px; color:var(--ink-3)}
.todo.done{border-color:var(--olive)}
.todo.done .tx b{color:var(--olive)}
.swap{display:flex; flex-wrap:wrap; gap:5px; margin:2px 0 16px}
.swap button{font-size:11.5px; padding:7px 11px; border-radius:99px; cursor:pointer;
  border:1px solid var(--rule); background:transparent; color:var(--ink-3); font-family:inherit; font-weight:500}
.swap button:hover{border-color:var(--red); color:var(--red)}
.swap span{font-size:11.5px; color:var(--ink-3); align-self:center; margin-right:3px}
.alert{border:1px solid var(--red); background:var(--shade); border-radius:var(--r-lg);
  padding:15px; margin:0 0 14px}
.alert h3{margin:0 0 6px; font-size:18px; color:var(--red); letter-spacing:-.02em}
.alert p{margin:0 0 11px; font-size:13.5px; color:var(--ink-2)}
@media(max-width:520px){
  .mast h1{font-size:22px}
  h2.sec{font-size:25px}
  .tape-row .mid{min-width:88px}
  .fi.w{width:68px} .fi.r{width:54px} .fi.s{width:50px} .fi.rir{width:50px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mast">
      <div>
        <h1 class="dsp">Training</h1>
        <div class="camp dsp" id="camp">—</div>
      </div>
      <button class="themebtn" id="themebtn">Light</button>
    </div>
    <nav id="nav"></nav>
  </header>

  <section class="tab on" id="t-today"></section>
  <section class="tab" id="t-train"></section>
  <section class="tab" id="t-combat"></section>
  <section class="tab" id="t-mobility"></section>
  <section class="tab" id="t-body"></section>
  <section class="tab" id="t-run"></section>

<script>
/* ================= STORAGE =================
   localStorage first (that's what you get when the file runs on your phone),
   with an in-memory fallback so nothing crashes if a browser blocks it. */
var K={logs:"fc_logs",runs:"fc_runs",tests:"fc_tests",done:"fc_done",goals:"fc_goals",theme:"fc_theme"};
var Store=(function(){
  var ok=false, mem={};
  try{localStorage.setItem("__fc","1");localStorage.removeItem("__fc");ok=true;}catch(e){ok=false;}
  return{
    ok:ok,
    label: ok?"Saved on this device":"Session only — storage blocked",
    get:function(k,dflt){
      try{ if(ok){var v=localStorage.getItem(k); return v==null?dflt:JSON.parse(v);} }catch(e){}
      return (k in mem)?mem[k]:dflt;
    },
    set:function(k,v){
      mem[k]=v;
      try{ if(ok)localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
    }
  };
})();
var DB={
  logs:  Store.get(K.logs,[]),    // lifts + bodyweight skills: {ts,id,date,w,r,s,rir,n}
  runs:  Store.get(K.runs,[]),    // {ts,date,mins,note}
  tests: Store.get(K.tests,{}),   // {"2026-07":{bw,run,push,plank,jump,shuttle}}
  done:  Store.get(K.done,[]),    // {ts,date,type} session completions
  goals: Store.get(K.goals,{})    // {exId:target}
};
function save(k){Store.set(K[k],DB[k]);}

/* ================= SMALL HELPERS ================= */
function el(t,c,h){var e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function pad(n){return String(n).padStart(2,"0");}
function today(){var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function thisMonth(){var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1);}
function prevMonth(m){var p=m.split("-"),y=+p[0],n=+p[1]-1; if(n===0){n=12;y--;} return y+"-"+pad(n);}
function monthName(m){
  var names=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var p=m.split("-"); return names[+p[1]-1]+" "+p[0];
}
function num(v){var n=parseFloat(v); return isNaN(n)?null:n;}
function round1(n){return Math.round(n*10)/10;}

var toastT=null;
function toast(msg){
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("on");},1900);
}
function confirmBox(title,body,okLabel){
  return new Promise(function(res){
    var v=document.getElementById("veil");
    document.getElementById("mtitle").textContent=title;
    document.getElementById("mbody").textContent=body;
    var yes=document.getElementById("myes"), no=document.getElementById("mno");
    yes.textContent=okLabel||"Confirm";
    function close(val){v.classList.remove("on"); yes.onclick=null; no.onclick=null; v.onclick=null; res(val);}
    yes.onclick=function(){close(true);}; no.onclick=function(){close(false);};
    v.onclick=function(e){if(e.target===v)close(false);};
    v.classList.add("on");
  });
}

/* ================= THE FIVE-DAY SPLIT =================
   Week: Pull · Push · Legs · rest · Upper · Lower · rest
   Quads and hamstrings are matched at 14 hard sets each per week. */
var PROGRAM=[
{key:"pull",name:"Pull",sub:"Back · rear delts · traps · biceps",
 focus:"Back width and thickness, rear delts, traps, biceps and forearms.",ex:[
 {id:"pul_pulldown",name:"Wide-Grip Lat Pulldown",musc:"Lats — width",sets:"4",reps:"8–12",rir:"1–2",rest:"2–2.5 min",tempo:"2-1-2",
  cues:["Drive the elbows down toward your hips — sweep the bar to the upper chest rather than pulling with the hands.","Ribcage up, lean back about 15° and hold it. Full stretch overhead without shrugging into your ears."],

  prog:"Add reps 8→12 across all four sets at RIR 1–2, then one pin and back to 8.",
  why:"The most scalable vertical pull for lat width, and the load micro-adjusts cleanly for double progression. Leads the day so width gets your freshest effort. Weighted pull-ups are a good swap once you own the reps."},
 {id:"pul_csrow",name:"Chest-Supported Row",musc:"Mid-back thickness",sets:"3",reps:"8–12",rir:"1–2",rest:"2 min",tempo:"2-1-2",
  cues:["Chest glued to the pad. Row to the lower ribs and pause a second in the squeeze.","Retract and depress the shoulder blades; elbows around 45°, not flared to 90°."],

  prog:"Double progression 8→12, then load.",

 {id:"pul_cablerow",name:"Seated Cable Row (neutral)",musc:"Back thickness",sets:"3",reps:"10–12",rir:"1–2",rest:"90s–2 min",tempo:"2-1-2",
  cues:["Tall torso, minimal swing. Pull to the navel with the elbows tight to the body.","Let the shoulder blades protract fully at the front for a real stretch each rep."],
  bad:["Rocking the torso to move the weight.","Shrugging the traps at the top.","Skipping the stretch at the front."],
  prog:"Double progression 10→12.",
  why:"A third back angle that loads the stretched position under constant cable tension — completes thickness alongside the pulldown and chest-supported row."},
 {id:"pul_reardelt",name:"Reverse Pec-Deck / Cable Fly",musc:"Rear delts",sets:"3",reps:"12–20",rir:"0–1",rest:"60–90s",tempo:"2-1-1",
  cues:["Lead with the pinkies and elbows — think about spreading the arms wide.","Keep the traps down and relaxed; a little external rotation cleans up the line of pull."],
  bad:["Turning it into a row as the elbows bend and drive back.","Going heavy enough that the traps take over."],
  prog:"Double progression 12→20, then load.",

 {id:"pul_shrug",name:"Dumbbell Shrug",musc:"Upper traps",sets:"3",reps:"10–15",rir:"1–2",rest:"90s",tempo:"2-1-1",
  cues:["Shrug straight up toward your ears, pause and squeeze hard at the top.","Full stretch at the bottom. No rolling."],

  prog:"Double progression 10→15.",

 {id:"pul_inclinecurl",name:"Incline Dumbbell Curl",musc:"Biceps — long head",sets:"3",reps:"8–12",rir:"1–2",rest:"90s",tempo:"3-0-1",
  cues:["Elbows stay behind the torso for the whole set — the stretched position is the entire point.","Supinate hard, full stretch at the bottom, no swinging."],

 {id:"pul_hammer",name:"Hammer Curl",musc:"Brachialis / brachioradialis",sets:"3",reps:"10–15",rir:"1–2",rest:"75–90s",tempo:"2-0-1",

 {id:"pul_reversecurl",name:"Reverse Curl (EZ bar or rope)",musc:"Forearm extensors",sets:"3",reps:"12–15",rir:"0–1",rest:"60–75s",tempo:"2-0-2",

 {id:"psh_pushdown",name:"Triceps Rope Pushdown",musc:"Triceps — lateral / medial",sets:"3",reps:"10–15",rir:"0–1",rest:"60–90s",tempo:"2-0-2",

/* rest timer */
var tInt=null,tLeft=0;
function wireTimer(){
  var tv=document.getElementById("tv"); if(!tv)return;
  document.querySelectorAll(".timer button[data-s]").forEach(function(b){
    b.onclick=function(){tLeft=parseInt(b.dataset.s,10); tv.classList.remove("ring"); runTimer();};
  });
  document.getElementById("tstop").onclick=function(){clearInterval(tInt);tInt=null;tLeft=0;paintTimer();tv.classList.remove("ring");};
  paintTimer();
}
function paintTimer(){
  var tv=document.getElementById("tv"); if(!tv)return;
  tv.textContent=Math.floor(tLeft/60)+":"+pad(tLeft%60);
}
function runTimer(){
  if(tInt)clearInterval(tInt);
  tInt=setInterval(function(){
    tLeft--; paintTimer();
    if(tLeft<=0){clearInterval(tInt);tInt=null;beep();var tv=document.getElementById("tv");if(tv)tv.classList.add("ring");}
  },1000);
  paintTimer();
}
function beep(){
  try{
    var c=new (window.AudioContext||window.webkitAudioContext)();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type="square";o.frequency.value=760;
    g.gain.setValueAtTime(.09,c.currentTime);o.start();
    setTimeout(function(){o.stop();c.close();},420);
  }catch(e){}
  if(navigator.vibrate)try{navigator.vibrate([180,90,180]);}catch(e){}
}

/* ================= CHART ================= */
function lineChart(pts){
  var W=640,H=190,L=36,R=10,T=14,B=26;
  if(!pts.length)return "";
  var ys=pts.map(function(p){return p.y;});
  var mn=Math.min.apply(null,ys), mx=Math.max.apply(null,ys);
  if(mx===mn){mx=mn+1;}
  var pad=(mx-mn)*.15; mn=Math.max(0,mn-pad); mx=mx+pad;
  var px=function(i){return pts.length===1?(L+(W-L-R)/2):L+i*(W-L-R)/(pts.length-1);};
  var py=function(v){return T+(H-T-B)*(1-(v-mn)/(mx-mn));};
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">';
  for(var g=0;g<=3;g++){
    var v=mn+(mx-mn)*g/3, y=py(v);
    s+='<line class="gridline" x1="'+L+'" y1="'+y+'" x2="'+(W-R)+'" y2="'+y+'"/>';
    s+='<text class="tick" x="'+(L-6)+'" y="'+(y+3)+'" text-anchor="end">'+round1(v)+'</text>';
  }
  var d=pts.map(function(p,i){return (i?"L":"M")+px(i)+" "+py(p.y);}).join(" ");
  s+='<path class="line" d="'+d+'"/>';
  var best=Math.max.apply(null,ys);
  pts.forEach(function(p,i){
    s+='<circle class="dot'+(p.y===best?" best":"")+'" cx="'+px(i)+'" cy="'+py(p.y)+'" r="4"/>';
  });
  var step=Math.ceil(pts.length/6);
  pts.forEach(function(p,i){
    if(i%step===0||i===pts.length-1)
      s+='<text class="tick" x="'+px(i)+'" y="'+(H-8)+'" text-anchor="middle">'+esc(p.label)+'</text>';
  });
  s+='</svg>';
  return s;
}

    bwm.forEach(function(k,i){
      var row=el("div","hrow");
      row.appendChild(el("span","d",monthName(k).slice(0,3)+" "+k.slice(0,4)));
      var prevV=bwm[i+1]?DB.tests[bwm[i+1]].bw:null;
      var dl=prevV!=null?round1(DB.tests[k].bw-prevV):null;
      row.appendChild(el("span","l",'<span class="num">'+DB.tests[k].bw+' kg</span>'+
        (dl!=null?' <span style="font-size:12px;color:var(--ink-3)" class="num">('+(dl>0?"+":"")+dl+')</span>':"")));
      box2.appendChild(row);
    });
    bc.appendChild(box2);
    if(bwm.length>1){
      var pts=bwm.slice().reverse().map(function(k){return{label:k.slice(5),y:DB.tests[k].bw};});
      var ch=el("div"); ch.style.marginTop="12px";
      ch.innerHTML=lineChart(pts); bc.appendChild(ch);
    }
  }
  root.appendChild(bc);

  /* data tools */
  var dc=el("div","card");
  dc.appendChild(el("h3","blk dsp","Your data"));
  dc.appendChild(el("p",null,"<strong>"+DB.logs.length+"</strong> sets, <strong>"+DB.runs.length+"</strong> runs, <strong>"+
    Object.keys(DB.tests).length+"</strong> monthly tests. "+Store.label+"."));
  var tools=el("div","tools");
  var ex=el("button","btn ghost sm","Export backup"); ex.onclick=exportAll;
  var im=el("button","btn ghost sm","Import backup"); im.onclick=function(){document.getElementById("impf").click();};
  var wipe=el("button","btn warn sm","Erase everything"); wipe.onclick=eraseAll;
  var fi=el("input"); fi.type="file"; fi.id="impf"; fi.accept="application/json"; fi.style.display="none";
  fi.onchange=importAll;
  tools.appendChild(ex); tools.appendChild(im); tools.appendChild(wipe); tools.appendChild(fi);
  dc.appendChild(tools);
  root.appendChild(dc);
}
function tapeRow(name,a,b,unit,better){
  var row=el("div","tape-row");
  var has=(a!=null&&b!=null);
  var improved=null;
  if(has&&better!=="flat"){ improved = better==="down" ? (b<a) : (b>a); if(a===b)improved=null; }
  row.appendChild(el("div","was num",a!=null?a+(unit?" "+unit:""):"—"));
  var mid=el("div","mid");
  mid.appendChild(el("span","n",name));
  if(has){
    var d=round1(b-a);
    var cls=improved===null?"":(improved?"better":"worse");
    mid.appendChild(el("span","dl "+cls,(d>0?"+":"")+d));
  }
  row.appendChild(mid);
  row.appendChild(el("div","now num dsp "+(improved===null?"":(improved?"better":"worse")),
    b!=null?b+(unit?" "+unit:""):"—"));
  return row;
}
function exportAll(){
  var data={logs:DB.logs,runs:DB.runs,tests:DB.tests,done:DB.done,goals:DB.goals,exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="training-backup-"+today()+".json"; a.click();
  toast("Backup downloaded.");
}
function importAll(e){
  var f=e.target.files[0]; if(!f)return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var d=JSON.parse(rd.result);
      ["logs","runs","tests","done","goals"].forEach(function(k){ if(d[k]){DB[k]=d[k]; save(k);} });
      toast("Backup restored."); rerender();
    }catch(err){toast("Couldn't read that file.");}
  };
  rd.readAsText(f); e.target.value="";
}
function eraseAll(){
  confirmBox("Erase everything","Every set, run, session and monthly test will be deleted. Export a backup first if you want to keep any of it.","Erase").then(function(ok){
    if(!ok)return;
    DB.logs=[];DB.runs=[];DB.tests={};DB.done=[];DB.goals={};
    ["logs","runs","tests","done","goals"].forEach(save);
    toast("All data erased."); rerender();
  });
}

/* ================= METHOD ================= */
function renderMethod(){
  var root=document.getElementById("t-method"); root.innerHTML="";
  root.appendChild(el("p","eyebrow","How the whole thing works"));
  root.appendChild(el("h2","sec dsp","Method"));
  root.appendChild(el("p","lede","Six things drive everything in here. If you only remember one, make it the first."));
  [
   ["Double progression","Every lift has a rep range. Keep the weight fixed and add reps until you hit the top of the range on every prescribed set at the target RIR. Only then add the smallest increment available and drop back to the bottom of the range. Reps first, always — it's the low-risk way to prove you own the load. Worked example: incline dumbbell press at 6–10. Start where you get 6. Climb 6, 7, 8, 9, 10 across weeks. When all four sets hit 10 at RIR 1–2, take the next dumbbell up and restart near 6."],
   ["Why quads and hamstrings now match","Both sit at 14 hard sets a week. Quads: Smith squat 4 and leg extension 3 on Legs, leg press 4 and Bulgarian split squat 3 on Lower. Hamstrings: seated curl 4 and Romanian deadlift 4 on Legs, lying curl 3 and 45° hip extension 3 on Lower. The hamstring sets also split evenly between knee flexion and hip extension at 7 each, because the muscle does two jobs and only training one of them leaves half of it behind."],
   ["Power is not conditioning","The Combat sessions look short because they are meant to. Explosive work adapts on quality, not accumulation — five hard throws with full recovery build more power than twenty tired ones, which mostly teach your nervous system to move slowly. Stop the set when the speed drops, not when you're out of breath. The conditioning finishers are separate on purpose."],
   ["Running by time, not distance","Distance rewards going faster than you should. Continuous time rewards the thing you actually want, which is an aerobic base that holds up in round three. Run slow enough to hold the whole rung, clear it twice, then move up. The pace takes care of itself."],
   ["Deload every 5–8 weeks","Or sooner if several lifts stall at once, your joints ache, sleep goes or motivation is on the floor. Keep the same exercises, halve the sets, keep the loads moderate at RIR 3–4, and run it for a week. Then pick the weights back up where you left them. A deload is planned, not lost."],
   ["When a lift stalls","Two or three sessions with no movement, in this order: check sleep, protein and stress first, because most plateaus are recovery. Then micro-load with smaller jumps. Then shift the rep range up for a block. Then tighten the tempo. Then swap for an equivalent variation. Add a set only if you're recovering well, and deload if several lifts stall together."]
  ].forEach(function(p){
    var c=el("div","card");
    c.appendChild(el("h3","blk dsp",p[0]));
    c.appendChild(el("p",null,p[1]));
    root.appendChild(c);
  });
  var wk=el("div","card");
  wk.appendChild(el("h3","blk dsp","A week that fits"));
  wk.appendChild(el("p",null,"Lifting is the spine of the week and everything else fills the gaps. This is a template, not a rule — the sessions matter more than the days."));
  wk.appendChild(el("ul",null,
    "<li><strong>Mon</strong> Pull · mobility 10 min</li>"+
    "<li><strong>Tue</strong> Push · run</li>"+
    "<li><strong>Wed</strong> Legs</li>"+
    "<li><strong>Thu</strong> Rest · Combat A · full mobility</li>"+
    "<li><strong>Fri</strong> Upper · run</li>"+
    "<li><strong>Sat</strong> Lower</li>"+
    "<li><strong>Sun</strong> Rest · Combat B or bodyweight · full mobility</li>"));
  wk.appendChild(el("p","hint","Bodyweight sessions are short enough to attach to any day. Last day of the month, run the test."));
  root.appendChild(wk);
}


/* ================= TODAY ================= */
var WEEK=[
 {d:"Sun",lift:null,extras:["cmb_b","mob"],note:"Rest from the weights. Combat B or a bodyweight session, then the full flexibility hour."},
 {d:"Mon",lift:"pull",extras:["mob10"]},
 {d:"Tue",lift:"push",extras:["run"]},
 {d:"Wed",lift:"legs",extras:[]},
 {d:"Thu",lift:null,extras:["cmb_a","mob"],note:"Rest from the weights. Combat A, then the full flexibility hour while you're warm."},
 {d:"Fri",lift:"upper",extras:["run"]},
 {d:"Sat",lift:"lower",extras:[]}
];
var EXTRA_DEF={
 cmb_a:{t:"Combat A",s:"Rotation and throwing power · 30–40 min",tab:"combat",log:"cmb_a"},
 cmb_b:{t:"Combat B",s:"Movement and change of direction · 30–40 min",tab:"combat",log:"cmb_b"},
 mob:{t:"Full flexibility session",s:"Splits, kick height, whole body · 45 min",tab:"mobility",log:"mob"},
 mob10:{t:"Flexibility — short dose",s:"Pick two blocks · 10 min",tab:"mobility",log:"mob"},
 run:{t:"Run",s:"Continuous time, at a pace you can hold",tab:"run",log:null},
 bw:{t:"Bodyweight session",s:"Balance and skill first, while you're fresh",tab:"body",log:"bw"}
};
function isMonthEnd(){
 var d=new Date(), t=new Date(d.getFullYear(),d.getMonth()+1,0);
 return d.getDate()===t.getDate();
}
function overrideKey(){return "day_"+today();}
function plannedLift(){
 var o=DB.goals[overrideKey()];
 if(o!==undefined)return o;
 return WEEK[new Date().getDay()].lift;
}
function lastTop(id){
 var mine=logsFor(id);
 if(!mine.length)return null;
 var l=mine[mine.length-1];
 return {date:l.date.slice(5), txt:(l.w?l.w+" × ":"")+(l.r||"—")+(l.s?" × "+l.s:"")};
}
function renderToday(){
 var root=document.getElementById("t-today"); root.innerHTML="";
 var now=new Date(), dow=now.getDay(), plan=WEEK[dow], lift=plannedLift();
 var names=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
 var mn=["January","February","March","April","May","June","July","August","September","October","November","December"];

 root.appendChild(el("p","eyebrow",names[dow]+" · "+now.getDate()+" "+mn[now.getMonth()]));
 root.appendChild(el("h2","sec dsp","Today"));

 if(isMonthEnd()){
  var a=el("div","alert");
  a.appendChild(el("h3","dsp","Test day"));
  a.appendChild(el("p",null,"Last day of the month. Run the six-test battery on fresh legs, type the numbers into Progress, then export a backup while you're there."));
  var go=el("button","btn sm","Open Progress"); go.onclick=function(){switchTab("progress");};
  a.appendChild(go); root.appendChild(a);
 }

 /* week strip */
 var ws=el("div","week");
 WEEK.forEach(function(w,i){
  var l=w.lift?PROGRAM.filter(function(p){return p.key===w.lift;})[0].name:"Rest";
  var c=el("div",(i===dow?"now":"")+(w.lift?"":" off"),w.d+"<b>"+l+"</b>");
  ws.appendChild(c);
 });
 root.appendChild(ws);

 /* the session */
 var day=lift?PROGRAM.filter(function(p){return p.key===lift;})[0]:null;
 var hero=el("div","hero"+(day?"":" rest"));
 hero.appendChild(el("div","when",day?"Today's session":"No lifting today"));
 hero.appendChild(el("h3","dsp",day?day.name:"Rest"));
 hero.appendChild(el("p","sub",day?day.focus:(plan.note||"Rest, eat, sleep. Come back for it tomorrow.")));
 if(day){
  var sets=day.ex.reduce(function(t,x){return t+(parseInt(x.sets,10)||0);},0);
  var doneToday=DB.logs.filter(function(l){return l.date===today()&&day.ex.some(function(x){return x.id===l.id;});}).length;
  var m=el("div","meta");
  m.innerHTML="<div><b>"+day.ex.length+"</b>exercises</div><div><b>"+sets+"</b>working sets</div>"+
              "<div><b>"+doneToday+"</b>logged so far</div>";
  hero.appendChild(m);
 }
 root.appendChild(hero);

 /* swap */
 var sw=el("div","swap");
 sw.appendChild(el("span",null,"Different session today?"));
 PROGRAM.forEach(function(p){
  var b=el("button",null,p.name);
  b.onclick=function(){DB.goals[overrideKey()]=p.key; save("goals"); renderToday(); toast("Switched to "+p.name+" for today.");};
  sw.appendChild(b);
 });
 var rb=el("button",null,"Rest");
 rb.onclick=function(){DB.goals[overrideKey()]=null; save("goals"); renderToday(); toast("Marked today as rest.");};
 sw.appendChild(rb);
 if(DB.goals[overrideKey()]!==undefined){
  var clr=el("button",null,"Reset");
  clr.onclick=function(){delete DB.goals[overrideKey()]; save("goals"); renderToday(); toast("Back to the planned week.");};
  sw.appendChild(clr);
 }
 root.appendChild(sw);

 /* quick log rows */
 if(day){
  day.ex.forEach(function(x){
   var q=el("div","qr"+(x.core?" core":""));
   var t=el("div","qr-t");
   t.appendChild(el("span","nm",esc(x.name)));
   var lt=lastTop(x.id);
   t.appendChild(el("span","tgt",x.sets+" × "+x.reps));
   t.appendChild(el("span","last"+(lt?"":" none"),lt?lt.txt:"—"));
   t.onclick=function(){q.classList.toggle("open");};
   q.appendChild(t);
   var b=el("div","qr-b");
   b.appendChild(logInputs(x.id));
   b.appendChild(histRows(x.id,3));
   q.appendChild(b);
   root.appendChild(q);
  });
  var open=el("button","btn ghost full","Open the full session");
  open.style.marginTop="6px";
  open.onclick=function(){activeDay=day.key; switchTab("train");};
  root.appendChild(open);
 }

 /* extras */
 var ex=plan.extras.slice();
 if(!ex.length)ex=["mob10"];
 var eh=el("h3","blk dsp","Also today");
 eh.style.margin="22px 0 10px";
 root.appendChild(eh);
 ex.forEach(function(k){
  var d=EXTRA_DEF[k]; if(!d)return;
  var done=d.log&&DB.done.some(function(z){return z.date===today()&&z.type===d.log;});
  var row=el("div","todo"+(done?" done":""));
  var tx=el("div","tx");
  tx.appendChild(el("b",null,d.t+(done?" — done":"")));
  tx.appendChild(el("span",null,d.s));
  row.appendChild(tx);
  if(d.log&&!done){
   var lb=el("button","btn sm","Done"); lb.onclick=function(){markDone(d.log);};
   row.appendChild(lb);
  }
  var ob=el("button","btn ghost sm","Open"); ob.onclick=function(){switchTab(d.tab);};
  row.appendChild(ob);
  root.appendChild(row);
 });
}

/* ================= NAV / INIT ================= */
var TABS=[["today","Today",renderToday],["train","Train",renderTrain],["combat","Combat",renderCombat],["mobility","Flexibility",renderMobility],
          ["body","Bodyweight",renderBody],["run","Run",renderRun],["progress","Progress",renderProgress],
          ["method","Method",renderMethod]];
var current="today";
function rerender(){
  var t=TABS.filter(function(x){return x[0]===current;})[0];
  if(t)t[2]();
  paintCamp();
}
function switchTab(id){
  current=id;
  TABS.forEach(function(t){
    document.getElementById("t-"+t[0]).classList.toggle("on",t[0]===id);
    document.getElementById("nb-"+t[0]).classList.toggle("on",t[0]===id);
  });
  rerender();
  window.scrollTo({top:0,behavior:"smooth"});
}
function paintCamp(){
  var c=document.getElementById("camp");
  var m=thisMonth();
  c.textContent=monthName(m)+" · "+monthSessions(m)+" sessions";
}
function setTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("themebtn").textContent=(t==="dark"?"Light":"Dark");
  var meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute("content",t==="dark"?"#0c0a11":"#f5f3f9");
  Store.set(K.theme,t);
}
(function init(){
  var nav=document.getElementById("nav");
  TABS.forEach(function(t){
    var b=el("button",t[0]==="today"?"on":"",t[1]);
    b.id="nb-"+t[0];
    b.onclick=function(){switchTab(t[0]);};
    nav.appendChild(b);
  });
  setTheme(Store.get(K.theme,"dark"));
  document.getElementById("themebtn").onclick=function(){
    setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
  };
  TABS.forEach(function(t){t[2]();});
  switchTab("today");
  if(!Store.ok){
    var w=el("div","card");
    w.style.borderColor="var(--red)";
    w.innerHTML="<h3 class='blk dsp'>Storage is blocked</h3><p>This browser won't let the app save, so anything you log disappears on refresh. Download the files and open <b>index.html</b> from your own device instead.</p>";
    document.getElementById("t-today").prepend(w);
  }
  if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
    window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});
  }
})();
</script>
